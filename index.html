<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tauranga, New Zealand Roleplay</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1> Tauranga, New Zealand Roleplay</h1>
    <p>3T Report</p>

    <form id="reportForm">

        <label>Vehicle Plate</label>
        <input type="text" id="plate" placeholder="ABC123" required>

        <label>Location</label>
        <input type="text" id="location" placeholder="Enter location" required>

        <label>Time of Day</label>
        <select id="time">
            <option>Day</option>
            <option>Night</option>
            <option>Dawn</option>
            <option>Dusk</option>
        </select>

        <label>Callsign</label>
        <input type="text" id="callsign" placeholder="1A-12" required>

        <button type="submit"> Submit 3T Report</button>

    </form>
</div>

<script src="script.js"></script>

</body>
</html>
